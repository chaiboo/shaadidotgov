# Parliament Kundli -- curated birth data
#
# Birth DATES are well-sourced (Wikipedia / ECI affidavits / official bio).
# Birth TIMES are almost never public. We default to 12:00 local (noon) as
# an honest "chart mahurat" and flag any figure where the astrology press
# has circulated a more specific time. Moon moves ~13 degrees/day, so a
# noon default keeps the moon-nakshatra right unless the Moon crossed a
# nakshatra boundary that day -- those are flagged in `notes`.
#
# time_confidence: high | circulated | noon-default
# tz_offset: hours east of UTC (India = 5.5)

